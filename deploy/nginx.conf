# nginx внутри контейнера Purrz.
#
# Одна задача:
#   - раздаём собранный SPA из /srv/web (туда положил Dockerfile из stage 1)
#   - проксируем /api/* → uvicorn на 127.0.0.1:8000
#   - history API fallback для SPA-роутера (все неизвестные пути → index.html)
#   - /healthz отдаёт 200, когда подняты и nginx, и бэк (это нужно нашей
#     awwwdde-панели — она ждёт healthcheck перед добавлением маршрута Caddy).

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    upstream purrz_backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 8080 default_server;
        server_name _;

        # ── healthcheck для awwwdde-панели ─────────────────────────────────
        # Просто проксируем в бэк, бэк уже отвечает 200.
        location = /healthz {
            proxy_pass http://purrz_backend/healthz;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── API ────────────────────────────────────────────────────────────
        # Снимаем префикс /api/, потому что роуты FastAPI без него
        # (см. backend/app/main.py: /categories, /services, /companies …).
        location /api/ {
            proxy_pass http://purrz_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Прямой проброс /docs и /openapi.json (FastAPI Swagger) — удобно
        # быстро потыкать API на demo.
        location /docs {
            proxy_pass http://purrz_backend/docs;
        }
        location /openapi.json {
            proxy_pass http://purrz_backend/openapi.json;
        }

        # ── SPA ────────────────────────────────────────────────────────────
        root /srv/web;
        index index.html;

        # Длинный кэш на хеш-имена ассетов Vite.
        location /assets/ {
            try_files $uri =404;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Любой неизвестный путь — index.html (React Router сам разберётся).
        location / {
            try_files $uri /index.html;
        }
    }
}
